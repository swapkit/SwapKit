timeout: 1800s
options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Step 0: Fetch full Git history
  - name: 'gcr.io/cloud-builders/git'
    id: 'fetch-full-history'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        git config --global url."https://$$GITHUB_TOKEN@github.com/".insteadOf "https://github.com/"
        git fetch --unshallow --tags
        
        if [ -n "$_PR_NUMBER" ] && [ -n "$BRANCH_NAME" ]; then
          git fetch origin $BRANCH_NAME
        fi
        
        echo "Repository prepared:"
        git log --oneline -n 5
    secretEnv: ['GITHUB_TOKEN']

  # Step 1: Detect changed files
  - name: 'gcr.io/cloud-builders/git'
    id: 'get-changed-files'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Build environment:"
        echo "PR_NUMBER: ${_PR_NUMBER:-NOT_SET}"
        echo "BRANCH_NAME: ${BRANCH_NAME:-NOT_SET}"
        echo "COMMIT_SHA: ${COMMIT_SHA:-NOT_SET}"

        if [ "$BRANCH_NAME" = "feat/DOP-112" ] || [ "$BRANCH_NAME" = "main" ] || [ "$BRANCH_NAME" = "staging" ]; then
          : # Allowed branch
        else
          echo "Non-core branch detected - skipping"
          exit 0
        fi

        if [ -n "$_PR_NUMBER" ]; then
          git fetch origin $BRANCH_NAME --depth=1
          git diff --name-only origin/$BRANCH_NAME HEAD > /workspace/changed_files.txt || git ls-files > /workspace/changed_files.txt
        else
          if [ $(git rev-list --count HEAD) -gt 1 ]; then
            git diff --name-only HEAD^ HEAD > /workspace/changed_files.txt || git ls-files > /workspace/changed_files.txt
          else
            git ls-files > /workspace/changed_files.txt
          fi
        fi

        echo "Changed files:"
        cat /workspace/changed_files.txt

  # Step 2: Set environment
  - id: set-env-vars
    name: 'gcr.io/cloud-builders/gcloud'
    script: |
      #!/usr/bin/env bash
      TARGET_ENV=feat
      if [ "${BRANCH_NAME}" == "main" ]; then
        TARGET_ENV=dev
      fi
      if [ "${BRANCH_NAME}" == "staging" ]; then
        TARGET_ENV=stage
      fi
      
      echo "Building for environment: ${TARGET_ENV}"
      echo "${TARGET_ENV}" > /workspace/target_env.txt
    env:
      - 'BRANCH_NAME=${BRANCH_NAME}'

  # Step 3: Build directly with Kaniko
  - name: 'gcr.io/kaniko-project/executor:latest'
    id: 'build-widget-vite'
    waitFor: ['set-env-vars']
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        TARGET_ENV=$(cat /workspace/target_env.txt)
        
        echo "Building widget/vite with Kaniko..."
        echo "Environment: ${TARGET_ENV}"
        echo "Context: /workspace/playground/vite"
        
        /kaniko/executor \
          --destination=us-docker.pkg.dev/$PROJECT_ID/widget/widget:$SHORT_SHA \
          --destination=us-docker.pkg.dev/$PROJECT_ID/widget/widget:${TARGET_ENV} \
          --cache=true \
          --cache-ttl=6h \
          --context=/workspace/playground/vite \
          --dockerfile=/workspace/playground/vite/Dockerfile \
          --build-arg=BUILD_ENV=${TARGET_ENV} \
          --build-arg=NODE_ENV=production \
          --verbosity=info

tags:
  - "widget-build"
  - "playground-vite"

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/cloudbuild-github-access-token/versions/latest
      env: 'GITHUB_TOKEN'